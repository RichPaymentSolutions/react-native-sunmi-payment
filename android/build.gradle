def safeExtGet(prop, fallback) {
  return rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

def reactNativeVersion =
  project.findProperty("reactNativeVersion") ?: safeExtGet("reactNativeVersion", "0.73.6")
def sunmiSdkVersion =
  project.findProperty("sunmiSdkVersion") ?: safeExtGet("sunmiSdkVersion", "1.0.10")

apply plugin: "com.android.library"

android {
  namespace "com.richpayment.sunmipayment.reactnative"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
    consumerProguardFiles "consumer-rules.pro"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  sourceSets {
    main {
      manifest.srcFile "src/main/AndroidManifest.xml"
      java.srcDirs = [
        "src/main/java",
        "../core/src/main/java",
        "../react-native-bridge/src/main/java"
      ]
    }
  }
}

dependencies {
  implementation "com.sunmi:L3AndRemoteOuterSDK:${sunmiSdkVersion}"
  compileOnly "com.facebook.react:react-android:${reactNativeVersion}"
}
